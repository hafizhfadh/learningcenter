name: Build and Deploy Laravel Learning Center

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/learning-center

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: learning_center_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, dom, fileinfo, pgsql, redis, gd, zip, bcmath, pcntl
        coverage: xdebug

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Copy environment file
      run: cp .env.example .env

    - name: Validate Composer files
      run: |
        echo "Validating composer.json syntax..."
        composer validate --no-check-lock
        echo "Checking composer.lock synchronization..."
        if ! composer validate --quiet; then
          echo "⚠️  composer.lock is not synchronized with composer.json"
          echo "This may cause dependency issues. Consider running:"
          echo "  composer update --lock"
          echo "or for missing packages:"
          echo "  composer require <package-name>"
          echo ""
          echo "Detailed validation output:"
          composer validate
          exit 1
        fi
        echo "✅ Composer files are valid and synchronized"

    - name: Install Composer dependencies
      run: composer install --prefer-dist --no-progress --optimize-autoloader

    - name: Install NPM dependencies
      run: npm ci

    - name: Generate application key
      run: php artisan key:generate

    - name: Set up database
      env:
        DB_CONNECTION: pgsql
        DB_HOST: localhost
        DB_PORT: 5432
        DB_DATABASE: learning_center_test
        DB_USERNAME: postgres
        DB_PASSWORD: postgres
        REDIS_HOST: localhost
        REDIS_PORT: 6379
      run: |
        php artisan config:cache
        php artisan migrate --force

    - name: Build frontend assets
      run: npm run build

    - name: Run PHP tests
      env:
        DB_CONNECTION: pgsql
        DB_HOST: localhost
        DB_PORT: 5432
        DB_DATABASE: learning_center_test
        DB_USERNAME: postgres
        DB_PASSWORD: postgres
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        APP_ENV: testing
      run: php artisan test --coverage

    - name: Run PHP Static Analysis
      run: |
        # Ensure PHPStan temp directory exists
        mkdir -p storage/phpstan
        # Run PHPStan analysis with configuration
        vendor/bin/phpstan analyse --memory-limit=2G --error-format=github

    - name: Run security checks
      run: |
        # PHP security audit
        composer audit
        
        # Frontend audit
        npm audit --audit-level moderate

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/production/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
        build-args: |
          APP_ENV=production

    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.spdx.json

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  deploy-staging:
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    environment:
      name: staging
      url: https://staging.learning-center.example.com

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to staging
      env:
        STAGING_HOST: ${{ secrets.STAGING_HOST }}
        STAGING_USER: ${{ secrets.STAGING_USER }}
        STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "Deploying Laravel Learning Center to staging..."
        
        # Setup SSH
        mkdir -p ~/.ssh
        echo "$STAGING_SSH_KEY" > ~/.ssh/staging_key
        chmod 600 ~/.ssh/staging_key
        
        # Deploy via SSH
        ssh -i ~/.ssh/staging_key -o StrictHostKeyChecking=no $STAGING_USER@$STAGING_HOST << 'EOF'
          cd /var/www/learning-center
          export IMAGE_TAG=${{ github.sha }}
          docker-compose -f docker-compose.production.yml pull
          docker-compose -f docker-compose.production.yml up -d
          docker-compose exec -T app php artisan migrate --force
          docker-compose exec -T app php artisan config:cache
          docker-compose exec -T app php artisan route:cache
          docker-compose exec -T app php artisan view:cache
        EOF

    - name: Run staging health check
      run: |
        sleep 30
        curl -f https://staging.learning-center.example.com/health || exit 1

  deploy-production:
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    environment:
      name: production
      url: https://learning-center.example.com

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract tag
      id: tag
      run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Deploy to production
      env:
        PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
        PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
        PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        IMAGE_TAG: ${{ steps.tag.outputs.tag }}
      run: |
        echo "Deploying Laravel Learning Center v${{ steps.tag.outputs.tag }} to production..."
        
        # Setup SSH
        mkdir -p ~/.ssh
        echo "$PRODUCTION_SSH_KEY" > ~/.ssh/production_key
        chmod 600 ~/.ssh/production_key
        
        # Blue-Green deployment
        ssh -i ~/.ssh/production_key -o StrictHostKeyChecking=no $PRODUCTION_USER@$PRODUCTION_HOST << 'EOF'
          cd /var/www/learning-center
          
          # Run blue-green deployment script
          export IMAGE_TAG=${{ steps.tag.outputs.tag }}
          ./scripts/blue-green-deploy.sh
          
          # Run post-deployment tasks
          docker-compose exec -T app php artisan migrate --force
          docker-compose exec -T app php artisan config:cache
          docker-compose exec -T app php artisan route:cache
          docker-compose exec -T app php artisan view:cache
          docker-compose exec -T app php artisan queue:restart
        EOF

    - name: Run production health check
      run: |
        sleep 60
        curl -f https://learning-center.example.com/health || exit 1

    - name: Create GitHub release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        release_name: Release ${{ steps.tag.outputs.tag }}
        body: |
          ## Changes in this Release
          - Automated deployment of Laravel Learning Center
          - Docker image: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}`
          
          ## Deployment Information
          - **Environment**: Production
          - **Deployed at**: ${{ github.event.head_commit.timestamp }}
          - **Commit**: ${{ github.sha }}
        draft: false
        prerelease: false

  notify:
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always() && (needs.deploy-staging.result != 'skipped' || needs.deploy-production.result != 'skipped')

    steps:
    - name: Notify deployment status
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        if [[ "${{ needs.deploy-staging.result }}" == "success" ]]; then
          echo "✅ Staging deployment successful"
          STATUS_STAGING="✅ Success"
        elif [[ "${{ needs.deploy-staging.result }}" == "failure" ]]; then
          echo "❌ Staging deployment failed"
          STATUS_STAGING="❌ Failed"
        else
          STATUS_STAGING="⏭️ Skipped"
        fi
        
        if [[ "${{ needs.deploy-production.result }}" == "success" ]]; then
          echo "✅ Production deployment successful"
          STATUS_PRODUCTION="✅ Success"
        elif [[ "${{ needs.deploy-production.result }}" == "failure" ]]; then
          echo "❌ Production deployment failed"
          STATUS_PRODUCTION="❌ Failed"
        else
          STATUS_PRODUCTION="⏭️ Skipped"
        fi
        
        # Send Slack notification if webhook is configured
        if [[ -n "$SLACK_WEBHOOK_URL" ]]; then
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🚀 Laravel Learning Center Deployment\n• Staging: $STATUS_STAGING\n• Production: $STATUS_PRODUCTION\n• Commit: ${{ github.sha }}\n• Branch: ${{ github.ref_name }}\"}" \
            $SLACK_WEBHOOK_URL
        fi