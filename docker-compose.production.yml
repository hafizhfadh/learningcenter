# Production Docker Compose Configuration
# This file demonstrates proper production deployment with external secrets

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.frankenphp.improved
      target: app
    container_name: learningcenter_app
    restart: unless-stopped
    ports:
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      # Application
      - APP_NAME=LearningCenter
      - APP_ENV=production
      - APP_KEY=${APP_KEY}  # Inject from external secrets
      - APP_DEBUG=false
      - APP_URL=${APP_URL}
      
      # Database (External PostgreSQL Cluster)
      - DB_CONNECTION=pgsql
      - DB_HOST=${DB_HOST}  # External PostgreSQL cluster host
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSLMODE=${DB_SSLMODE:-require}  # SSL mode for cluster connection
      
      # Cache & Session
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      
      # Queue
      - QUEUE_CONNECTION=redis
      
      # Mail
      - MAIL_MAILER=smtp
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      
      # Storage
      - FILESYSTEM_DISK=s3
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_BUCKET=${AWS_BUCKET}
      
      # Caddy Admin (disabled by default for security)
      - CADDY_ADMIN_ENABLED=false
      - CADDY_API_URL=http://localhost:2019
      - CADDY_API_TIMEOUT=30
      
      # Security
      - TRUSTED_PROXIES=*
      - TRUSTED_HOSTS=${TRUSTED_HOSTS}
    volumes:
      - app_storage:/app/storage
      - ./etc/frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # PostgreSQL cluster is external - no container needed
  # Database connectivity configured via environment variables

  redis:
    image: redis:7-alpine
    container_name: learningcenter_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Optional: Queue worker (uncomment if using queues)
  # queue:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.frankenphp.improved
  #     target: app
  #   container_name: learningcenter_queue
  #   restart: unless-stopped
  #   command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
  #   environment:
  #     # Same environment variables as app service
  #   depends_on:
  #     - postgres
  #     - redis
  #   networks:
  #     - app_network
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M
  #         cpus: '0.5'

  # Optional: Scheduler (uncomment if using scheduled tasks)
  # scheduler:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.frankenphp.improved
  #     target: app
  #   container_name: learningcenter_scheduler
  #   restart: unless-stopped
  #   command: php artisan schedule:work
  #   environment:
  #     # Same environment variables as app service
  #   depends_on:
  #     - postgres
  #     - redis
  #   networks:
  #     - app_network

volumes:
  redis_data:
    driver: local
  app_storage:
    driver: local

networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16