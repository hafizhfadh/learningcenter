name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      CACHE_STORE: array
      SESSION_DRIVER: array
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          extensions: pgsql, redis
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare application key
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run test suite
        run: php artisan test --without-tty

  docker:
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'
    env:
      IMAGE_REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/hafizhfadh/learningcenter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          file: deploy/production/Dockerfile
          build-args: |
            APP_ENV=production

      - name: Record built image digest
        run: echo "Built ${{ env.IMAGE_NAME }} with tags ${{ steps.meta.outputs.tags }}"
