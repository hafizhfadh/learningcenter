[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:frankenphp]
command=frankenphp run --config /etc/caddy/Caddyfile
directory=/app
user=www-data
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/frankenphp.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
environment=LARAVEL_OCTANE_LISTEN="0.0.0.0:8000"

[program:octane-worker]
command=php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000 --workers=4 --task-workers=2
directory=/app
user=www-data
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/octane.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
numprocs=1
startsecs=10
stopwaitsecs=30

[program:queue-worker]
command=php artisan queue:work --sleep=3 --tries=3 --max-time=3600 --memory=512
directory=/app
user=www-data
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/queue.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
numprocs=2
startsecs=10
stopwaitsecs=30

[program:schedule-worker]
command=php artisan schedule:work
directory=/app
user=www-data
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/schedule.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
numprocs=1
startsecs=10
stopwaitsecs=30

[program:horizon]
command=php artisan horizon
directory=/app
user=www-data
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/horizon.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
numprocs=1
startsecs=10
stopwaitsecs=30

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface