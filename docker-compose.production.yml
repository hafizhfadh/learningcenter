# Production Docker Compose Configuration
# This file demonstrates proper production deployment with external secrets
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.frankenphp.improved
      target: app
    container_name: learningcenter_app
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
      - "443:443"
      - "443:443/udp"  # HTTP/3
      - "2019:2019"
    env_file:
      - .env.production
    volumes:
      - app_storage:/app/storage
      - ./etc/frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network
    # Add DNS configuration for external database connectivity
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # Add extra hosts for database cluster if needed
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Security options for external connectivity
    security_opt:
      - no-new-privileges:true
    # Add capability for network access
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # PostgreSQL cluster is external - no container needed
  # Database connectivity configured via environment variables

  redis:
    image: redis:7-alpine
    container_name: learningcenter_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_network
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Optional: Queue worker (uncomment if using queues)
  # queue:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.frankenphp.improved
  #     target: app
  #   container_name: learningcenter_queue
  #   restart: unless-stopped
  #   command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
  #   env_file:
  #     - .env.production
  #   depends_on:
  #     - redis
  #   networks:
  #     - app_network
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M
  #         cpus: '0.5'

  # Optional: Scheduler (uncomment if using scheduled tasks)
  # scheduler:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.frankenphp.improved
  #     target: app
  #   container_name: learningcenter_scheduler
  #   restart: unless-stopped
  #   command: php artisan schedule:work
  #   env_file:
  #     - .env.production
  #   depends_on:
  #     - redis
  #   networks:
  #     - app_network

volumes:
  redis_data:
    driver: local
  app_storage:
    driver: local

networks:
  app_network:
    driver: bridge
    # Use host networking for external database connectivity
    # This allows containers to access external services like the PostgreSQL cluster
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"