version: '3.8'

services:
  # Caddy Web Server for Application Management
  caddy:
    image: caddy:2.7-alpine
    container_name: "${APP_NAME:-laravel}_caddy"
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./docker/production/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - app_storage:/app/storage:ro
    environment:
      - CADDY_ADMIN=0.0.0.0:2019
      - UPSTREAM_HOST=app
      - UPSTREAM_PORT=8000
      - APP_DOMAIN=${APP_DOMAIN:-localhost}
    depends_on:
      - app
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.docker.compose.service=caddy"

  # Laravel Application with FrankenPHP and Octane
  app:
    build:
      context: .
      dockerfile: ./docker/production/Dockerfile
      args:
        - PHP_VERSION=${PHP_VERSION:-8.3}
        - COMPOSER_VERSION=${COMPOSER_VERSION:-2.6}
    container_name: "${APP_NAME:-laravel}_app"
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - app_storage:/app/storage
      - app_bootstrap_cache:/app/bootstrap/cache
      - app_logs:/app/storage/logs
      - ./docker/production/php.ini:/usr/local/etc/php/conf.d/99-production.ini:ro
      - ./docker/production/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    environment:
      # Application Configuration
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-https://localhost}
      
      # External Database Configuration (PostgreSQL on separate server)
      - DB_CONNECTION=pgsql
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSLMODE=${DB_SSLMODE:-require}
      
      # External Redis Configuration (Redis on separate server)
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      
      # Cache and Session Configuration
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - BROADCAST_DRIVER=redis
      
      # Octane Configuration
      - OCTANE_SERVER=frankenphp
      - OCTANE_WORKERS=${OCTANE_WORKERS:-4}
      - OCTANE_TASK_WORKERS=${OCTANE_TASK_WORKERS:-6}
      - OCTANE_MAX_REQUESTS=${OCTANE_MAX_REQUESTS:-500}
      
      # Supervisor Configuration
      - SUPERVISOR_PHP_COMMAND=/usr/local/bin/php
      - SUPERVISOR_PHP_USER=www-data
      
      # Logging Configuration
      - LOG_CHANNEL=${LOG_CHANNEL:-stack}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      
      # Mail Configuration
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.docker.compose.service=app"

  # Horizon Queue Worker
  horizon:
    build:
      context: .
      dockerfile: ./docker/production/Dockerfile
      args:
        - PHP_VERSION=${PHP_VERSION:-8.3}
        - COMPOSER_VERSION=${COMPOSER_VERSION:-2.6}
    container_name: "${APP_NAME:-laravel}_horizon"
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - app_storage:/app/storage
      - app_logs:/app/storage/logs
      - ./docker/production/php.ini:/usr/local/etc/php/conf.d/99-production.ini:ro
    environment:
      # Application Configuration
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      
      # External Database Configuration
      - DB_CONNECTION=pgsql
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSLMODE=${DB_SSLMODE:-require}
      
      # External Redis Configuration
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      
      # Queue Configuration
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - BROADCAST_DRIVER=redis
      
      # Logging Configuration
      - LOG_CHANNEL=${LOG_CHANNEL:-stack}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - app
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.docker.compose.service=horizon"

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: ./docker/production/Dockerfile
      args:
        - PHP_VERSION=${PHP_VERSION:-8.3}
        - COMPOSER_VERSION=${COMPOSER_VERSION:-2.6}
    container_name: "${APP_NAME:-laravel}_scheduler"
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - app_storage:/app/storage
      - app_logs:/app/storage/logs
      - ./docker/production/php.ini:/usr/local/etc/php/conf.d/99-production.ini:ro
    environment:
      # Application Configuration
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      
      # External Database Configuration
      - DB_CONNECTION=pgsql
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSLMODE=${DB_SSLMODE:-require}
      
      # External Redis Configuration
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      
      # Cache Configuration
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      
      # Logging Configuration
      - LOG_CHANNEL=${LOG_CHANNEL:-stack}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - app
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "pgrep", "-f", "schedule:work"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.docker.compose.service=scheduler"

networks:
  app_network:
    driver: bridge
    name: "${APP_NAME:-laravel}_network"

volumes:
  # Application volumes
  app_storage:
    name: "${APP_NAME:-laravel}_app_storage"
  app_bootstrap_cache:
    name: "${APP_NAME:-laravel}_app_bootstrap_cache"
  app_logs:
    name: "${APP_NAME:-laravel}_app_logs"
  
  # Caddy volumes
  caddy_data:
    name: "${APP_NAME:-laravel}_caddy_data"
  caddy_config:
    name: "${APP_NAME:-laravel}_caddy_config"