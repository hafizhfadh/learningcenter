# this file overrides your production compose for local use
# - publishes app port 9000 to localhost
# - prevents GHCR pulls (uses your local image)
# - points to secrets/.env.local
# - adds Postgres+Redis
# - disables Traefik entirely

services:
  app:
    image: ghcr.io/hafizhfadh/learningcenter:local
    pull_policy: if_not_present
    ports:
      - "9000:9000"
    env_file:
      - ./secrets/.env.local
    secrets:
      - app_env_local
    # mount opcache config if you want; safe to keep
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      - ./php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/99-opcache.ini:ro
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    # don’t rely on traefik locally
    labels: []
    networks:
      - services

  horizon:
    image: ghcr.io/hafizhfadh/learningcenter:local
    pull_policy: if_not_present
    env_file:
      - ./secrets/.env.local
    secrets:
      - app_env_local
    command: php artisan horizon
    volumes:
      - app_storage:/var/www/html/storage:rw
      - app_bootstrap_cache:/var/www/html/bootstrap/cache:rw
      - ./php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/99-opcache.ini:ro
    depends_on:
      - app
    networks:
      - services

  queue:
    image: ghcr.io/hafizhfadh/learningcenter:local
    pull_policy: if_not_present
    env_file:
      - ./secrets/.env.local
    secrets:
      - app_env_local
    command: >
      php artisan queue:work redis --sleep=3 --tries=${HORIZON_TRIES:-3} --max-time=3600 --max-jobs=500
    volumes:
      - app_storage:/var/www/html/storage:rw
      - app_bootstrap_cache:/var/www/html/bootstrap/cache:rw
      - ./php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/99-opcache.ini:ro
    depends_on:
      - app
    networks:
      - services

  scheduler:
    image: ghcr.io/hafizhfadh/learningcenter:local
    pull_policy: if_not_present
    env_file:
      - ./secrets/.env.local
    secrets:
      - app_env_local
    command: php artisan schedule:work
    volumes:
      - app_storage:/var/www/html/storage:rw
      - app_bootstrap_cache:/var/www/html/bootstrap/cache:rw
      - ./php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/99-opcache.ini:ro
    depends_on:
      - app
    networks:
      - services

  # local postgres
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: learningcenter
      POSTGRES_USER: lc
      POSTGRES_PASSWORD: lcpassword
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - services

  # local redis
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - services

  # disable traefik completely for local
  traefik:
    profiles: ["disabled"]

secrets:
  app_env_local:
    file: ./secrets/.env.local

volumes:
  db_data:
  redis_data:
