[sources.docker]
type = "docker_logs"
include_containers = ["app", "horizon", "queue", "scheduler", "caddy"]
exclude_containers = ["vector", "cadvisor", "node_exporter", "wireguard"]

[transforms.enrich]
type = "remap"
inputs = ["docker"]
source = '''
  .service = .container_name
  .host = get_env!("VECTOR_HOSTNAME", get_hostname!())
  .environment = get_env!("APP_ENV", "production")
'''

[transforms.normalize]
type = "remap"
inputs = ["enrich"]
source = '''
  .message = tostring(.message)
  .timestamp = now()
'''

[sinks.loki]
type = "loki"
inputs = ["normalize"]
endpoint = "${VECTOR_LOKI_ENDPOINT:?set VECTOR_LOKI_ENDPOINT}"
healthcheck.enabled = true
compression = "gzip"
labels = {service = "{{ service }}", host = "{{ host }}", environment = "{{ environment }}"}
encoding.codec = "json"
batch.max_bytes = 1048576
batch.timeout_secs = 5
request.concurrency = 2
request.rate_limit_num = 10
request.rate_limit_duration = "1s"
auth.strategy = "basic"
auth.user = "${VECTOR_LOKI_USERNAME:?set VECTOR_LOKI_USERNAME}"
auth.password = "${VECTOR_LOKI_PASSWORD:?set VECTOR_LOKI_PASSWORD}"

[sinks.s3_backup]
type = "aws_s3"
inputs = ["normalize"]
bucket = "${VECTOR_S3_BUCKET:?set VECTOR_S3_BUCKET}"
region = "${VECTOR_S3_REGION:?set VECTOR_S3_REGION}"
compression = "gzip"
encoding.codec = "json"
key_prefix = "logs/%Y/%m/%d/"
aws.access_key_id = "${VECTOR_S3_ACCESS_KEY:?set VECTOR_S3_ACCESS_KEY}"
aws.secret_access_key = "${VECTOR_S3_SECRET_KEY:?set VECTOR_S3_SECRET_KEY}"
buffer.max_events = 5000
buffer.when_full = "block"
