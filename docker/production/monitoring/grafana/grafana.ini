# Grafana Configuration for Production Monitoring

[server]
protocol = http
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(port)s/
serve_from_sub_path = false

[database]
type = postgres
host = postgres:5432
name = grafana
user = ${GRAFANA_DB_USER}
password = ${GRAFANA_DB_PASSWORD}
ssl_mode = require

[session]
provider = redis
provider_config = addr=redis:6379,pool_size=100,db=grafana
cookie_name = grafana_sess
cookie_secure = true
session_life_time = 86400

[security]
admin_user = ${GRAFANA_ADMIN_USER}
admin_password = ${GRAFANA_ADMIN_PASSWORD}
secret_key = ${GRAFANA_SECRET_KEY}
disable_gravatar = true
cookie_secure = true
cookie_samesite = strict
content_type_protection = true
x_content_type_options = true
x_xss_protection = true
strict_transport_security = true
strict_transport_security_max_age = 31536000

[auth]
disable_login_form = false
disable_signout_menu = false
oauth_auto_login = false

[auth.anonymous]
enabled = false

[auth.basic]
enabled = true

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer
default_theme = dark

[alerting]
enabled = true
execute_alerts = true
error_or_timeout = alerting
nodata_or_nullvalues = no_data
concurrent_render_limit = 5

[smtp]
enabled = true
host = ${SMTP_HOST}:${SMTP_PORT}
user = ${SMTP_USER}
password = ${SMTP_PASSWORD}
cert_file =
key_file =
skip_verify = false
from_address = ${SMTP_FROM_ADDRESS}
from_name = Grafana
ehlo_identity = dashboard.yourdomain.com

[log]
mode = console file
level = info
format = text

[log.console]
level = info
format = text

[log.file]
level = info
format = text
log_rotate = true
max_lines = 1000000
max_size_shift = 28
daily_rotate = true
max_days = 7

[metrics]
enabled = true
interval_seconds = 10

[tracing.jaeger]
address = jaeger:14268
always_included_tag = tag1:value1
sampler_type = const
sampler_param = 1

[feature_toggles]
enable = publicDashboards

[plugins]
enable_alpha = false
app_tls_skip_verify_insecure = false

[enterprise]
license_path = /etc/grafana/license.jwt