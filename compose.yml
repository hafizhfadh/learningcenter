services:
    web:
        image: learningcenter
        build:
            context: .
            dockerfile: docker/production/Dockerfile
            target: production
        env_file:
            - .env.production
        environment:
        # Ensure FrankenPHP binds to :80 inside container
            SERVER_NAME: "learning.csi-academy.id"
        labels:
            - dev.orbstack.domains=app.learningcenter.orb.local
        ports:
            - "80:80"
            - "443:443"
            # Remove Vite in strict prod mimic; keep only if you truly run it inside
            # - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
        command: >
            sh -lc "php artisan octane:frankenphp
            --host=0.0.0.0 --port=80
            --caddyfile=/etc/frankenphp/Caddyfile
            --admin-port=2019
            --no-interaction"
        depends_on:
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "curl -fsS http://localhost/health || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        restart: unless-stopped
        networks: [app_net]
        volumes:
            - caddy_data:/data
            - caddy_config:/config
            - ./certs:/etc/certs:ro
        logging:
            driver: json-file
            options: { max-size: "10m", max-file: "3" }

    queue:
        image: learningcenter
        env_file: [.env.production]
        command: php artisan queue:work --tries=3 --timeout=90 --sleep=3
        depends_on:
            redis:
                condition: service_healthy
        restart: unless-stopped
        networks: [app_net]
        logging:
            driver: json-file
            options: { max-size: "10m", max-file: "3" }

    schedule:
        image: learningcenter
        env_file: [.env.production]
        command: php artisan schedule:work
        depends_on:
            redis:
                condition: service_healthy
        restart: unless-stopped
        networks: [app_net]
        logging:
            driver: json-file
            options: { max-size: "10m", max-file: "3" }

    # Optional: nicer queue dashboard (if your app includes Horizon)
    horizon:
        image: learningcenter
        env_file: [.env.production]
        command: php artisan horizon
        depends_on:
            redis:
                condition: service_healthy
        restart: unless-stopped
        networks: [app_net]
        logging:
            driver: json-file
            options: { max-size: "10m", max-file: "3" }

    redis:
        image: 'redis:alpine'
        ports:
            - '6379:6379'
        volumes:
            - 'redis:/data'
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            retries: 3
            timeout: 5s
        networks:
            - app_net

volumes:
    caddy_data:
        driver: local
    caddy_config:
        driver: local
    redis: 
        driver: local
        driver_opts:
            type: 'none'
            o: 'bind'
            device: '${REDIS_VOLUME_LOCAL:-./database/redis-database/}'

networks:
    app_net:
        driver: bridge
