x-env-file: &app_env_file ./secrets/.env.production

x-app-environment: &app_environment
  APP_ENV: production
  APP_DEBUG: 'false'
  APP_URL: ${APP_URL:-https://learning.csi-academy.id}
  APP_HOST: ${APP_HOST:-learning.csi-academy.id}
  APP_TIMEZONE: UTC
  APP_LOCALE: en
  LOG_CHANNEL: stack
  LOG_STACK_CHANNELS: single,stderr
  LOG_STDERR_FORMATTER: Monolog\\Formatter\\JsonFormatter
  TRUSTED_PROXIES: traefik
  SESSION_DRIVER: redis
  SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
  SESSION_COOKIE: ${SESSION_COOKIE:-learningcenter_session}
  SESSION_SECURE_COOKIE: 'true'
  BROADCAST_DRIVER: redis
  CACHE_DRIVER: redis
  CACHE_PREFIX: ${CACHE_PREFIX:-learningcenter}
  QUEUE_CONNECTION: redis
  HORIZON_PREFIX: horizon
  MAIL_MAILER: smtp
  MAIL_ENCRYPTION: tls
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no-reply@csi-academy.id}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Learning Center}
  DB_CONNECTION: pgsql
  DB_HOST: ${DB_HOST:?database host required}
  DB_PORT: ${DB_PORT:-5432}
  DB_DATABASE: ${DB_DATABASE:?database name required}
  DB_USERNAME: ${DB_USERNAME:?database username required}
  DB_PASSWORD: ${DB_PASSWORD:?database password required}
  DB_SSLMODE: require
  DB_OPTIONS: "--client_encoding=UTF8"
  CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN:?cloudflare dns api token required}
  REDIS_CLIENT: phpredis
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:?redis password required}
  REDIS_SCHEME: ${REDIS_SCHEME:-tcp}
  OCTANE_SERVER: frankenphp
  OCTANE_HTTPS: 'true'
  OCTANE_LISTEN: tcp://0.0.0.0:9000
  OCTANE_WORKERS: ${OCTANE_WORKERS:-4}
  OCTANE_TASK_WORKERS: ${OCTANE_TASK_WORKERS:-2}
  OCTANE_MAX_REQUESTS: ${OCTANE_MAX_REQUESTS:-500}
  OCTANE_SWOLE_HTTP_COMPRESSION: 'true'
  OCTANE_WATCH: 'false'
  HORIZON_SUPERVISOR_MEMORY_LIMIT: ${HORIZON_SUPERVISOR_MEMORY_LIMIT:-256}
  HORIZON_TRIES: ${HORIZON_TRIES:-3}
  MAIL_HOST: ${MAIL_HOST:?mail host required}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USERNAME: ${MAIL_USERNAME:?mail username required}
  MAIL_PASSWORD: ${MAIL_PASSWORD:?mail password required}
  SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
  APP_KEY: ${APP_KEY:?application key required}
  XDG_DATA_HOME: /var/www/html/storage/caddy
  XDG_CONFIG_HOME: /var/www/html/storage/caddy
  OCTANE_FRANKENPHP_CADDYFILE: /etc/frankenphp/Caddyfile

x-app-base: &app_base
  image: ${APP_IMAGE:-ghcr.io/hafizhfadh/learningcenter:latest}
  pull_policy: always
  restart: always
  env_file:
    - *app_env_file
  environment:
    <<: *app_environment
  secrets:
    - source: app_env
      target: /var/www/html/.env
      uid: "1000"
      gid: "1000"
      mode: 0400
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:size=64m
    - /var/run:size=8m
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  networks:
    - services
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"
  # Healthcheck moved to per-service definitions (app, horizon, scheduler)
  # to avoid applying HTTP checks to non-HTTP workers like the queue service.
  deploy:
    update_config:
      order: start-first
      parallelism: 1
      delay: 15s
    restart_policy:
      condition: on-failure
      delay: 10s
      max_attempts: 3
    resources:
      limits:
        cpus: '2.0'
        memory: 2048M
      reservations:
        cpus: '1.0'
        memory: 512M

services:
  app:
    <<: *app_base
    command: >-
      sh -lc '
      mkdir -p /var/www/html/storage/framework/cache /var/www/html/storage/framework/data /var/www/html/storage/framework/sessions /var/www/html/storage/framework/testing /var/www/html/storage/framework/views /var/www/html/bootstrap/cache /var/www/html/storage/caddy;
      test -f /var/www/html/bootstrap/cache/preload.php || printf "<?php\n// OPcache preload stub - created at container start\n" > /var/www/html/bootstrap/cache/preload.php;
      find /var/www/html/bootstrap/cache -maxdepth 1 -type f -not -name preload.php -delete;
      php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=9000 --workers=${OCTANE_WORKERS:-4} --max-requests=${OCTANE_MAX_REQUESTS:-500} --task-workers=${OCTANE_TASK_WORKERS:-2}
      '
    expose:
      - "9000"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      - ./php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/99-opcache.ini:ro
      - ./php/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - frankenphp_data:/data
    read_only: true
    stop_grace_period: 60s
    healthcheck:
      test:
        - CMD-SHELL
        - code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://127.0.0.1:9000/health) && [ "$code" -eq 200 ] && curl -s --max-time 3 http://127.0.0.1:9000/health | grep -q "\"status\":\"ok\"" || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.docker.network=learningcenter_services
      - traefik.http.routers.app.rule=Host(`${APP_HOST:-learning.csi-academy.id}`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls.certresolver=cloudflare
      - traefik.http.routers.app.middlewares=default-security@file,default-compress@file,octane-buffering@file
      - traefik.http.services.app.loadbalancer.server.port=9000
      - traefik.http.services.app.loadbalancer.passhostheader=true

  horizon:
    <<: *app_base
    command: >-
      sh -lc '
      mkdir -p /var/www/html/storage/framework/cache /var/www/html/storage/framework/data /var/www/html/storage/framework/sessions /var/www/html/storage/framework/testing /var/www/html/storage/framework/views /var/www/html/bootstrap/cache;
      test -f /var/www/html/bootstrap/cache/preload.php || printf "<?php\n// OPcache preload stub - created at container start\n" > /var/www/html/bootstrap/cache/preload.php;
      php artisan horizon
      '
    volumes:
      - app_storage:/var/www/html/storage:rw
      - app_bootstrap_cache:/var/www/html/bootstrap/cache:rw
      - ./php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/99-opcache.ini:ro
      - frankenphp_data:/data
    read_only: true
    healthcheck:
      test:
        - CMD-SHELL
        - php artisan horizon:status | grep -q running
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 640M
        reservations:
          cpus: '0.2'
          memory: 256M

  queue:
    <<: *app_base
    command: >-
      sh -lc '
      mkdir -p /var/www/html/storage/framework/cache /var/www/html/storage/framework/data /var/www/html/storage/framework/sessions /var/www/html/storage/framework/testing /var/www/html/storage/framework/views /var/www/html/bootstrap/cache;
      test -f /var/www/html/bootstrap/cache/preload.php || printf "<?php\n// OPcache preload stub - created at container start\n" > /var/www/html/bootstrap/cache/preload.php;
      php artisan queue:work redis --sleep=3 --tries=${HORIZON_TRIES:-3} --max-time=3600 --max-jobs=500
      '
    volumes:
      - app_storage:/var/www/html/storage:rw
      - app_bootstrap_cache:/var/www/html/bootstrap/cache:rw
      - ./php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/99-opcache.ini:ro
      - frankenphp_data:/data
    read_only: true
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  scheduler:
    <<: *app_base
    command: >-
      sh -lc '
      mkdir -p /var/www/html/storage/framework/cache /var/www/html/storage/framework/data /var/www/html/storage/framework/sessions /var/www/html/storage/framework/testing /var/www/html/storage/framework/views /var/www/html/bootstrap/cache;
      test -f /var/www/html/bootstrap/cache/preload.php || printf "<?php\n// OPcache preload stub - created at container start\n" > /var/www/html/bootstrap/cache/preload.php;
      php artisan schedule:work
      '
    volumes:
      - app_storage:/var/www/html/storage:rw
      - app_bootstrap_cache:/var/www/html/bootstrap/cache:rw
      - ./php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/99-opcache.ini:ro
      - frankenphp_data:/data
    read_only: true
    healthcheck:
      test:
        - CMD-SHELL
        - php artisan schedule:list >/dev/null 2>&1
      interval: 5m
      timeout: 10s
      retries: 1
      start_period: 40s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 20s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  traefik:
    image: traefik:v3.0
    restart: always
    env_file:
      - *app_env_file
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN:?cloudflare api token required}
      TRAEFIK_ACME_EMAIL: ${TRAEFIK_ACME_EMAIL:-admin@csi-academy.id}
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${TRAEFIK_DOCKER_NETWORK:-learningcenter_services}
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.certresolver=cloudflare
      - --certificatesresolvers.cloudflare.acme.email=${TRAEFIK_ACME_EMAIL:-admin@csi-academy.id}
      - --certificatesresolvers.cloudflare.acme.storage=/etc/traefik/acme.json
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnschallenge.delaybeforecheck=0
      - --certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --ping=true
      - --api.dashboard=false
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
      - --accesslog=true
      - --accesslog.bufferingsize=100
      - --accesslog.format=json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/acme.json:/etc/traefik/acme.json
      - ./traefik/logs:/var/log/traefik
    depends_on:
      app:
        condition: service_started
    networks:
      - edge
      - services
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD
        - traefik
        - healthcheck
        - --ping
      interval: 5m
      timeout: 10s
      retries: 3
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 640M
        reservations:
          cpus: '0.2'
          memory: 256M

  redis:
    image: redis:alpine
    restart: always
    command: >-
      sh -c '
      exec redis-server /usr/local/etc/redis/redis.conf
        --requirepass "$$\(cat /run/secrets/redis_password)"
      '
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - services
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$\(cat /run/secrets/redis_password)" -h 127.0.0.1 -p 6379 ping | grep -q PONG
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    secrets:
      - source: redis_password
        target: redis_password
        uid: "999"
        gid: "999"
        mode: 0400

  redis-exporter:
    image: oliver006/redis_exporter:v1.64.0
    restart: always
    command: >-
      --web.listen-address=:9121
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    networks:
      - services
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:9121/metrics | head -n 1 >/dev/null 2>&1 || exit 1
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    secrets:
      - source: redis_password
        target: redis_password
        uid: "999"
        gid: "999"
        mode: 0400

networks:
  edge:
    driver: bridge
  services:
    driver: bridge

volumes:
  app_storage:
    driver: local
  app_bootstrap_cache:
    driver: local
  redis_data:
    driver: local
  frankenphp_data:
    driver: local

secrets:
  app_env:
    file: ./secrets/.env.production
  redis_password:
    file: ./secrets/redis_password
