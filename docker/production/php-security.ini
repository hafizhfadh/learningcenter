; PHP Security Configuration for Production
; /app/docker/production/php-security.ini

; Security Settings
expose_php = Off
allow_url_fopen = Off
allow_url_include = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/security/php_errors.log

; Session Security
session.cookie_httponly = On
session.cookie_secure = On
session.cookie_samesite = "Strict"
session.use_strict_mode = On
session.use_only_cookies = On
session.cookie_lifetime = 0
session.gc_maxlifetime = 3600
session.name = "LEARNINGSESSIONID"

; File Upload Security
file_uploads = On
upload_max_filesize = 10M
max_file_uploads = 5
upload_tmp_dir = /tmp

; Execution Security
max_execution_time = 60
max_input_time = 60
memory_limit = 256M
post_max_size = 20M
max_input_vars = 3000

; Disable dangerous functions
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source,file_get_contents,fopen,fread,fwrite,file_put_contents,fputs,fgets,fsockopen,gzopen,gzread,gzwrite,readfile

; Hide PHP version
expose_php = Off

; Prevent access to .htaccess and other sensitive files
auto_prepend_file = 
auto_append_file = 

; SQL injection protection
magic_quotes_gpc = Off
magic_quotes_runtime = Off

; XSS protection
default_charset = "UTF-8"

; Path security
open_basedir = /app:/tmp:/var/log/security

; Opcache security
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1
opcache.validate_timestamps = 0
opcache.save_comments = 0
opcache.load_comments = 0