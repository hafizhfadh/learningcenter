# Fail2Ban filter for Laravel authentication failures
#

[INCLUDES]

before = common.conf

[Definition]

# Option:  failregex
# Notes.:  regex to match the password failures messages in the logfile. The
#          host must be matched by a group named "host". The tag "<HOST>" can
#          be used for standard IP/hostname matching and is only an alias for
#          (?:::f{4,6}:)?(?P<host>[\w\-.^_]+)
# Values:  TEXT
#

failregex = .*\[(?P<datetime>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\].*\.ERROR:.*authentication\.failed.*ip.*<HOST>.*
            .*\[(?P<datetime>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\].*\.WARNING:.*Failed login attempt.*<HOST>.*
            .*\[(?P<datetime>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\].*\.ERROR:.*Illuminate\\Auth\\Events\\Failed.*<HOST>.*
            .*\[(?P<datetime>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\].*\.WARNING:.*Invalid credentials.*<HOST>.*
            .*\[(?P<datetime>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\].*\.ERROR:.*login\.failed.*<HOST>.*

# Option:  ignoreregex
# Notes.:  regex to ignore. If this regex matches, the line is ignored.
# Values:  TEXT
#
ignoreregex =

[Init]

# Option:  datepattern
# Notes.:  A regex matching the date format used in log files. The regex should
#          contain named groups for year, month, day, hour, minute, second.
# Values:  TEXT
#
datepattern = ^%%Y-%%m-%%d %%H:%%M:%%S