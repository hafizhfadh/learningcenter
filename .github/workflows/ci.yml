name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      CACHE_STORE: array
      SESSION_DRIVER: array
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          extensions: pgsql, redis
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare application key
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run test suite
        run: php artisan test --without-tty

  docker:
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'
    env:
      IMAGE_REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/hafizhfadh/learningcenter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=tag

      - name: Validate Dockerfile
        run: |
          echo "🔍 Validating Dockerfile configuration..."
          if [ ! -f "deploy/production/Dockerfile" ]; then
            echo "❌ Production Dockerfile not found"
            exit 1
          fi
          echo "✅ Dockerfile validation passed"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          file: deploy/production/Dockerfile
          build-args: |
            APP_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image and PHP extensions
        run: |
          echo "Testing PHP extensions in built image..."
          # Get the first tag (usually the SHA-based one)
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "Testing image: $IMAGE_TAG"
          
          # Test with opcache.preload disabled to avoid preload file issues during testing
          EXTENSIONS=$(docker run --rm --entrypoint="" --workdir=/tmp "$IMAGE_TAG" \
            php -d opcache.preload= -m | grep -E "(intl|pcntl|pdo_pgsql)" | wc -l)
          OPCACHE=$(docker run --rm --entrypoint="" --workdir=/tmp "$IMAGE_TAG" \
            php -d opcache.preload= -m | grep -i "zend opcache" | wc -l)
          
          if [ "$EXTENSIONS" -eq "3" ] && [ "$OPCACHE" -ge "1" ]; then
            echo "✅ All required PHP extensions found (intl, pcntl, pdo_pgsql, opcache)"
          else
            echo "❌ Missing required PHP extensions"
            echo "Found $EXTENSIONS/3 basic extensions and $OPCACHE opcache extensions"
            exit 1
          fi

      - name: Record deployment information
        run: |
          echo "🎉 Docker build and push completed successfully!"
          echo "📦 Built image: ${{ env.IMAGE_NAME }}"
          echo "🏷️  Tags: ${{ steps.meta.outputs.tags }}"
          echo "📋 Labels: ${{ steps.meta.outputs.labels }}"
          echo ""
          echo "🚀 Image is ready for production deployment!"
