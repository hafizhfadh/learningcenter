# Kernel Security Configuration for Production Server
# /etc/sysctl.d/99-security.conf

# Network Security
# =================

# IP Spoofing protection
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.all.rp_filter = 1

# Ignore ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Ignore send redirects
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Disable source packet routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Log Martians
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Ignore ICMP ping requests
net.ipv4.icmp_echo_ignore_all = 0
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP errors
net.ipv4.icmp_ignore_bogus_error_responses = 1

# SYN flood protection
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 2048
net.ipv4.tcp_synack_retries = 2
net.ipv4.tcp_syn_retries = 5

# IP forwarding (disable if not needed)
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# IPv6 Router Advertisements
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

# TCP/IP Stack Tuning
# ===================

# Increase the maximum amount of option memory buffers
net.core.optmem_max = 25165824

# Increase the maximum total buffer-space allocatable
net.core.rmem_default = 31457280
net.core.rmem_max = 67108864
net.core.wmem_default = 31457280
net.core.wmem_max = 67108864

# Increase the read-buffer space allocatable
net.ipv4.tcp_rmem = 4096 65536 67108864
net.ipv4.tcp_wmem = 4096 65536 67108864

# Increase the tcp-time-wait buckets pool size to prevent simple DOS attacks
net.ipv4.tcp_max_tw_buckets = 1440000
net.ipv4.tcp_tw_reuse = 1

# Limit the maximum memory used to reassemble IP fragments
net.ipv4.ipfrag_high_thresh = 512000
net.ipv4.ipfrag_low_thresh = 446464

# Increase the maximum number of skb-heads to be cached
net.core.hot_list_length = 1024

# Increase the tcp-time-wait buckets pool size
net.ipv4.tcp_max_tw_buckets = 1440000

# Allowed local port range
net.ipv4.ip_local_port_range = 16384 65535

# Default Socket Receive Buffer
net.core.rmem_default = 262144

# Maximum Socket Receive Buffer
net.core.rmem_max = 16777216

# Default Socket Send Buffer
net.core.wmem_default = 262144

# Maximum Socket Send Buffer
net.core.wmem_max = 16777216

# Increase number of incoming connections
net.core.somaxconn = 32768

# Increase number of incoming connections backlog
net.core.netdev_max_backlog = 16384
net.core.dev_weight = 64

# Increase the maximum amount of option memory buffers
net.core.optmem_max = 65536

# Increase the tcp-time-wait buckets pool size
net.ipv4.tcp_max_tw_buckets = 1440000

# TCP keepalive settings
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_probes = 3
net.ipv4.tcp_keepalive_intvl = 90

# Memory Management
# =================

# Controls the tendency of the kernel to reclaim the memory which is used for caching of directory and inode objects
vm.vfs_cache_pressure = 50

# Contains, as a percentage of total available memory that contains free pages and reclaimable
vm.dirty_background_ratio = 5

# Contains, as a percentage of total available memory that contains free pages and reclaimable
vm.dirty_ratio = 10

# The kernel will attempt to reclaim memory when the amount of free memory falls below this threshold
vm.min_free_kbytes = 65536

# Controls the tendency of the kernel to swap
vm.swappiness = 10

# Process Security
# ================

# Enable ExecShield protection
kernel.exec-shield = 1
kernel.randomize_va_space = 2

# Controls the System Request debugging functionality of the kernel
kernel.sysrq = 0

# Controls whether core dumps will append the PID to the core filename
kernel.core_uses_pid = 1

# Restrict access to kernel logs
kernel.dmesg_restrict = 1

# Restrict access to kernel pointers
kernel.kptr_restrict = 2

# Disable magic-sysrq key
kernel.sysrq = 0

# Restrict ptrace scope
kernel.yama.ptrace_scope = 1

# File System Security
# ====================

# Increase inotify limits
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 256

# Increase file descriptor limits
fs.file-max = 2097152

# Protection against creating or following links under certain conditions
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# Additional Security Settings
# ============================

# Disable IPv6 if not needed (uncomment if IPv6 is not used)
# net.ipv6.conf.all.disable_ipv6 = 1
# net.ipv6.conf.default.disable_ipv6 = 1
# net.ipv6.conf.lo.disable_ipv6 = 1

# Enable TCP Fast Open
net.ipv4.tcp_fastopen = 3

# TCP congestion control
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Disable uncommon network protocols
# install dccp /bin/true
# install sctp /bin/true
# install rds /bin/true
# install tipc /bin/true