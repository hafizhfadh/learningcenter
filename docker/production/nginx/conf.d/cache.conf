# Nginx caching configuration for production

# Proxy cache path
proxy_cache_path /var/cache/nginx/proxy
    levels=1:2
    keys_zone=app_cache:10m
    max_size=1g
    inactive=60m
    use_temp_path=off;

# FastCGI cache path (if needed)
fastcgi_cache_path /var/cache/nginx/fastcgi
    levels=1:2
    keys_zone=fastcgi_cache:10m
    max_size=500m
    inactive=30m
    use_temp_path=off;

# Cache key configuration
proxy_cache_key "$scheme$request_method$host$request_uri";

# Cache settings
proxy_cache app_cache;
proxy_cache_valid 200 302 10m;
proxy_cache_valid 301 1h;
proxy_cache_valid 404 1m;
proxy_cache_valid any 1m;

# Cache bypass conditions
proxy_cache_bypass $http_pragma $http_authorization $http_cache_control;
proxy_no_cache $http_pragma $http_authorization $http_cache_control;

# Cache headers
add_header X-Cache-Status $upstream_cache_status always;
add_header X-Cache-Key $proxy_cache_key;

# Cache lock to prevent cache stampede
proxy_cache_lock on;
proxy_cache_lock_timeout 5s;
proxy_cache_lock_age 5s;

# Use stale cache when backend is down
proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
proxy_cache_background_update on;