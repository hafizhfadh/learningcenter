services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.frankenphp.improved
      target: app
    container_name: learningcenter_app
    restart: unless-stopped

    # Publish HTTP and HTTPS (including HTTP/3) to the host
    ports:
      - "80:80"          # HTTP for redirects / ACME challenges
      - "443:443"        # HTTPS / HTTP/2
      - "443:443/udp"    # HTTP/3

    # Load environment variables from your production .env
    env_file:
      - .env.production
    # Override HOME/XDG paths so PsySH writes to /tmp, not /config/psysh
    environment:
      HOME: /tmp
      XDG_CONFIG_HOME: /tmp
      # Toggle Caddy admin API exposure (port 2019) as needed
      CADDY_ADMIN_ENABLED: "true"
      OCTANE_HTTPS: "true"
      APP_ENV: production

    # Persist application and logs, and mount the Caddyfile
    volumes:
      - app_storage:/app/storage
      - ./etc/frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - app_network

    # Healthcheck hits the internal /health endpoint
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Extra hardening; optional
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_ADMIN

  redis:
    image: redis:7-alpine
    container_name: learningcenter_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes

    volumes:
      - redis_data:/data
    networks:
      - app_network
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
    driver: local
  app_storage:
    driver: local

networks:
  app_network:
    driver: bridge
