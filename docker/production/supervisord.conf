[supervisord]
user=root
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

; --- Laravel Octane (FrankenPHP) ---
[program:octane]
command=php /var/www/html/artisan octane:frankenphp --host=0.0.0.0 --port=443 --https --caddyfile=/etc/frankenphp/Caddyfile --admin-port=2019 --no-interaction
autostart=true
autorestart=true
startsecs=3
priority=10
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; --- Queue worker (no --daemon needed) ---
[program:queue]
command=php /var/www/html/artisan queue:work --tries=3 --timeout=90 --sleep=3
autostart=true
autorestart=true
startsecs=3
priority=20
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; --- Scheduler (optional but recommended) ---
[program:schedule]
command=php /var/www/html/artisan schedule:work
autostart=true
autorestart=true
startsecs=3
priority=30
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:horizon]
command=php /var/www/html/artisan horizon
autostart=true
autorestart=true
priority=4
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[supervisorctl]

