# Fail2Ban filter for Laravel API abuse and rate limiting
#

[INCLUDES]

before = common.conf

[Definition]

# Option:  failregex
# Notes.:  regex to match API abuse patterns in Laravel logs
# Values:  TEXT
#

failregex = .*\[(?P<datetime>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\].*\.WARNING:.*Rate limit exceeded.*<HOST>.*
            .*\[(?P<datetime>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\].*\.ERROR:.*API abuse detected.*<HOST>.*
            .*\[(?P<datetime>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\].*\.WARNING:.*Too many requests.*<HOST>.*
            .*\[(?P<datetime>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\].*\.ERROR:.*Throttle.*<HOST>.*
            .*\[(?P<datetime>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\].*\.WARNING:.*Invalid API token.*<HOST>.*
            .*\[(?P<datetime>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\].*\.ERROR:.*Unauthorized API access.*<HOST>.*
            .*\[(?P<datetime>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\].*\.WARNING:.*Suspicious API activity.*<HOST>.*

# Option:  ignoreregex
# Notes.:  regex to ignore. If this regex matches, the line is ignored.
# Values:  TEXT
#
ignoreregex =

[Init]

# Option:  datepattern
# Notes.:  A regex matching the date format used in log files.
# Values:  TEXT
#
datepattern = ^%%Y-%%m-%%d %%H:%%M:%%S