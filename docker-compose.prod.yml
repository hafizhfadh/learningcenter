version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.frankenphp
    image: learningcenter-app:latest
    env_file:
      - .env.production
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
    ports:
      - "80:8000"      # host:container; use 443:443 and 443:443/udp if enabling HTTPS
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
