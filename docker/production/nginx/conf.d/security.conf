# Security configuration for Nginx

# Hide Nginx version
server_tokens off;

# Prevent access to hidden files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# Prevent access to backup files
location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
}

# Prevent access to configuration files
location ~* \.(conf|ini|log|bak|backup|old|orig|original|tmp|temp|swp|swo)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# Block common exploit attempts
location ~* (eval\(|base64_decode|gzinflate|rot13|str_rot13) {
    deny all;
    access_log off;
    log_not_found off;
}

# Block SQL injection attempts
location ~* (union.*select|insert.*into|delete.*from|drop.*table) {
    deny all;
    access_log off;
    log_not_found off;
}

# Block file injection attempts
location ~* \.(php|pl|py|jsp|asp|sh|cgi)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# Security headers map
map $sent_http_content_type $security_headers {
    default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';";
    ~*text/html "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';";
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=strict:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=uploads:10m rate=1r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=perip:10m;
limit_conn_zone $server_name zone=perserver:10m;

# DDoS protection
client_body_buffer_size 1K;
client_header_buffer_size 1k;
large_client_header_buffers 2 1k;

# Timeout settings
client_body_timeout 10;
client_header_timeout 10;
keepalive_timeout 5 5;
send_timeout 10;

# Buffer overflow protection
client_max_body_size 100M;
client_body_buffer_size 128k;
client_header_buffer_size 3m;
large_client_header_buffers 4 256k;