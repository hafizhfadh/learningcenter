name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      CACHE_STORE: array
      SESSION_DRIVER: array
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          extensions: pgsql, redis
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare application key
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run test suite
        run: php artisan test --without-tty

  docker:
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'
    env:
      IMAGE_REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/learningcenter
      DOCKERHUB_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/learningcenter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image names to lowercase
        id: names
        shell: bash
        run: |
          echo "IMAGE_NAME_LC=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "DOCKERHUB_IMAGE_LC=$(echo "${DOCKERHUB_IMAGE}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Detect optional credentials
        id: detect
        shell: bash
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          has_pat=false
          if [ -n "${GHCR_PAT}" ]; then has_pat=true; fi
          has_dh=false
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then has_dh=true; fi
          echo "has_pat=$has_pat" >> "$GITHUB_OUTPUT"
          echo "has_dh=$has_dh" >> "$GITHUB_OUTPUT"

      # GHCR login with PAT if provided (helps with orgs requiring SAML/SSO or cross-org pushes)
      - name: Log in to GHCR (PAT)
        if: steps.detect.outputs.has_pat == 'true'
        uses: docker/login-action@v3
        with:
          logout: false
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Fallback: GITHUB_TOKEN (works when pushing to same owner/org as repo)
      - name: Log in to GHCR (GITHUB_TOKEN)
        if: steps.detect.outputs.has_pat != 'true'
        uses: docker/login-action@v3
        with:
          logout: false
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.detect.outputs.has_dh == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (GHCR)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_LC }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=tag

      - name: Extract Docker metadata (Docker Hub)
        id: meta_dh
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE_LC }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=tag

      - name: Validate Dockerfile
        run: |
          echo "🔍 Validating Dockerfile configuration..."
          if [ ! -f "deploy/production/Dockerfile" ]; then
            echo "❌ Production Dockerfile not found"
            exit 1
          fi
          echo "✅ Dockerfile validation passed"

      - name: Build and push image (GHCR)
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          file: deploy/production/Dockerfile
          build-args: |
            APP_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (Docker Hub)
        id: build_push_dh
        if: steps.detect.outputs.has_dh == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta_dh.outputs.tags }}
          labels: ${{ steps.meta_dh.outputs.labels }}
          file: deploy/production/Dockerfile
          build-args: |
            APP_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image and PHP extensions
        run: |
          echo "Testing PHP extensions in built image..."
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "Testing image: $IMAGE_TAG"
          EXTENSIONS=$(docker run --rm --entrypoint="" --workdir=/tmp "$IMAGE_TAG" \
            php -d opcache.preload= -m | grep -E "(intl|pcntl|pdo_pgsql)" | wc -l)
          OPCACHE=$(docker run --rm --entrypoint="" --workdir=/tmp "$IMAGE_TAG" \
            php -d opcache.preload= -m | grep -i "zend opcache" | wc -l)
          if [ "$EXTENSIONS" -eq "3" ] && [ "$OPCACHE" -ge "1" ]; then
            echo "✅ All required PHP extensions found (intl, pcntl, pdo_pgsql, opcache)"
          else
            echo "❌ Missing required PHP extensions"
            echo "Found $EXTENSIONS/3 basic extensions and $OPCACHE opcache extensions"
            exit 1
          fi

      - name: Docker Hub push skipped (no credentials)
        if: steps.detect.outputs.has_dh != 'true'
        run: |
          echo "⚠️ Docker Hub credentials not provided. Skipping Docker Hub push."
          echo "To enable Docker Hub publishing, add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets."

      - name: Docker Hub push summary (success)
        if: steps.detect.outputs.has_dh == 'true' && steps.build_push_dh.conclusion == 'success'
        run: |
          echo "✅ Docker Hub push completed successfully."
          echo "📦 Published image: ${{ env.DOCKERHUB_IMAGE_LC }}"
          echo "🏷️  Tags: ${{ steps.meta_dh.outputs.tags }}"

      - name: Docker Hub push summary (failure)
        if: steps.detect.outputs.has_dh == 'true' && steps.build_push_dh.conclusion == 'failure'
        run: |
          echo "❌ Docker Hub push failed for ${{ env.DOCKERHUB_IMAGE_LC }}"
          echo "Troubleshooting tips:"
          echo "- Verify DOCKERHUB_TOKEN has write access (use a Docker Hub Access Token or PAT)."
          echo "- Ensure the repository exists or will be created on first push."
          echo "- Confirm the image name is lowercase."
          echo "- Check for rate limiting or network issues."
          exit 1

      - name: Record deployment information
        run: |
          echo "🎉 Docker build and push to GHCR completed successfully!"
          echo "📦 Built image: ${{ env.IMAGE_NAME_LC }}"
          echo "🏷️  Tags: ${{ steps.meta.outputs.tags }}"
          echo "📋 Labels: ${{ steps.meta.outputs.labels }}"
          echo ""
          echo "🚀 Image is ready for production deployment!"

      - name: Persist build artifact metadata
        id: save_artifacts
        shell: bash
        run: |
          echo "${{ steps.meta.outputs.tags }}" > ghcr_tags.txt
          echo "${{ steps.meta.outputs.labels }}" > ghcr_labels.txt
          if [ -n "${{ steps.build_push.outputs.digest }}" ]; then
            echo "${{ steps.build_push.outputs.digest }}" > ghcr_digest.txt
          fi
          if [ "${{ steps.detect.outputs.has_dh }}" = "true" ]; then
            echo "${{ steps.meta_dh.outputs.tags }}" > dockerhub_tags.txt
            echo "${{ steps.meta_dh.outputs.labels }}" > dockerhub_labels.txt
            if [ -n "${{ steps.build_push_dh.outputs.digest }}" ]; then
              echo "${{ steps.build_push_dh.outputs.digest }}" > dockerhub_digest.txt
            fi
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            ghcr_tags.txt
            ghcr_labels.txt
            ghcr_digest.txt
            dockerhub_tags.txt
            dockerhub_labels.txt
            dockerhub_digest.txt
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && needs.docker.result == 'success' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./release-assets

      - name: Determine next semantic version
        id: semver
        uses: PaulHatch/semantic-version@v5
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE|!"
          minor_pattern: "feat"
          patch_pattern: "fix|chore|refactor|docs|perf|style|test|ci"
          update_major_with_breaking_change: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.semver.outputs.version_tag }}
          name: ${{ steps.semver.outputs.version_tag }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/ghcr_tags.txt
            release-assets/ghcr_labels.txt
            release-assets/ghcr_digest.txt
            release-assets/dockerhub_tags.txt
            release-assets/dockerhub_labels.txt
            release-assets/dockerhub_digest.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}